# SPDX-License-Identifier: MPL-2.0
# SonarQube Cloud (SonarCloud) static analysis. Analysis scope + exclusions live
# in sonar-project.properties. Requires the SONAR_TOKEN repository secret
# (Settings -> Secrets and variables -> Actions) and a SonarCloud project:
# https://sonarcloud.io/project/overview?id=hyperpolymath_rsr-template-repo
# Mirrors the boj-server arrangement.
name: SonarQube
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0   # full history for accurate new-code detection
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
